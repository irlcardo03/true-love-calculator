            else if (score <= 89) category = "eliteEgo";
            else category = "legendary";

            // PICK RANDOM LINE
            let lines = savageData[category];
            text = lines[Math.floor(Math.random() * lines.length)];

            // SET TITLES
            if (score <= 9) title = "ABSOLUTE DISASTER 💀";
            else if (score <= 19) title = "EMBARRASSING ATTEMPT 😬";
            else if (score <= 29) title = "SITUATIONSHIP STARTER PACK 🚩";
            else if (score <= 39) title = "TEMPORARY HAPPINESS ⏳";
            else if (score <= 49) title = "MID BUT RISKY ⚠️";
            else if (score <= 59) title = "MANAGEABLE CHAOS 🌪️";
            else if (score <= 69) title = "DECENT BUT FRAGILE 🧊";
            else if (score <= 79) title = "STRONG BUT DANGEROUS 🔥";
            else if (score <= 89) title = "ELITE BUT EGO RISING 🏆";
            else title = "LEGENDARY BUT STILL MORTAL 👑";

            // UPDATE DOM
            document.getElementById('scoreDisplay').innerText = score + "%";
            document.getElementById('verdictTitle').innerText = title;
            document.getElementById('verdictText').innerText = text;
            
            // HIDE LOADER, SHOW RESULTS
            document.getElementById('loader').style.display = 'none';
            
            const resultArea = document.getElementById('resultArea');
            resultArea.style.display = 'block'; // Ensure it's block first
            
            // Trigger reflow to restart animation
            void resultArea.offsetWidth; 
            
            resultArea.classList.add('show');

            // PRO FEATURE: AUTO SCROLL TO RESULTS
            resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // Reset Blur Ad
            document.getElementById('blurOverlay').style.display = 'flex';
        }

        function revealBlurAd() {
            window.open('https://www.globaldigz.space/cl/6be31d263dc03f09', '_blank');
            document.getElementById('blurOverlay').style.display = 'none';
        }

        function copyResult() {
            let score = document.getElementById('scoreDisplay').innerText;
            let title = document.getElementById('verdictTitle').innerText;
            let text = `I got ${score} (${title}) on the Savage Love Calculator! 💔 Can you survive the truth? Check yours at SavageLoveCalc.com`;
            
            navigator.clipboard.writeText(text).then(() => {
                alert("Copied! Go roast your friends 📋");
            });
        }
    </script>
